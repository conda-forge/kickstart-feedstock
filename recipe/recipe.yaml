context:
  version: "0.6.0"

package:
  name: kickstart
  version: ${{ version }}

source:
  url: https://github.com/Keats/kickstart/archive/v${{ version }}.tar.gz
  sha256: 0888ca59bc11e2c9531957047973b3f4d28e4270c03d1272f29d8b73f12bb142

build:
  number: 0

requirements:
  build:
    - ${{ compiler('rust') }}
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
    - cargo-bundle-licenses

tests:
  - script:
      - kickstart --help

about:
  license: MIT
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  summary: Scaffolding tool to get new projects up and running quickly
  homepage: https://github.com/Keats/kickstart
  repository: https://github.com/Keats/kickstart

extra:
  recipe-maintainers:
    - danielnachun
